name: Daily Signalmind Update

on:
  workflow_dispatch:
    inputs:
      rss_limit:
        description: Number of RSS sources to ingest
        required: false
        default: "10"
      ai_limit:
        description: Number of new items to summarize and score
        required: false
        default: "5"
  schedule:
    # 05:30 UTC is 07:30 in Prague during summer time and 06:30 during winter time.
    - cron: "30 5 * * *"

concurrency:
  group: daily-signalmind-update
  cancel-in-progress: false

jobs:
  update:
    name: Ingest and process AI news
    runs-on: ubuntu-latest
    timeout-minutes: 40

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL }}
      DEFAULT_RSS_LIMIT: ${{ vars.RSS_LIMIT }}
      DEFAULT_AI_LIMIT: ${{ vars.AI_LIMIT }}
      AI_REQUEST_TIMEOUT_MS: ${{ vars.AI_REQUEST_TIMEOUT_MS }}
      DISABLE_TELEMETRY: 1
      NEXT_TELEMETRY_DISABLED: 1
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        timeout-minutes: 5
        run: npm ci

      - name: Typecheck
        timeout-minutes: 3
        run: npm run typecheck

      - name: Lint
        timeout-minutes: 3
        run: npm run lint

      - name: RSS ingest
        timeout-minutes: 8
        shell: bash
        run: |
          RSS_LIMIT="${{ inputs.rss_limit }}"
          RSS_LIMIT="${RSS_LIMIT:-${DEFAULT_RSS_LIMIT:-10}}"
          npm run ingest:rss -- --limit="$RSS_LIMIT"

      - name: AI summarize and score
        timeout-minutes: 18
        shell: bash
        run: |
          AI_LIMIT="${{ inputs.ai_limit }}"
          AI_LIMIT="${AI_LIMIT:-${DEFAULT_AI_LIMIT:-5}}"
          npm run ai:process -- --limit="$AI_LIMIT"
